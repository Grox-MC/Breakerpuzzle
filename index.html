<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOORS Door 100 Elevator Trainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050507;
            color: #f5ebd5;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            position: relative;
        }

        /* Timer mit fester Breite gegen Formänderung */
        .speedrun-timer {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 32px;
            color: #40352d;
            background-color: #060504;
            border: 3px solid #171310;
            border-bottom: 5px solid #110e0c;
            padding: 10px 0;
            margin-bottom: 25px;
            border-radius: 6px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.95), 0 10px 20px rgba(0,0,0,0.5);
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 320px;
            text-align: center;
            display: block;
            box-sizing: border-box;
        }
        
        .speedrun-timer span {
            color: #ff8400;
            text-shadow: 0 0 12px rgba(255, 132, 0, 0.6);
            font-variant-numeric: tabular-nums;
            margin-left: 8px;
        }

        .breaker-box {
            background: linear-gradient(135deg, #1b1511 0%, #0f0b08 100%);
            border: 16px solid #0a0705;
            outline: 5px solid #030202;
            padding: 35px 30px;
            width: 440px;
            border-radius: 6px;
            box-shadow: 0 35px 70px rgba(0,0,0,0.9), inset 0 0 50px rgba(0,0,0,0.8);
            box-sizing: border-box;
            transition: filter 0.3s ease;
        }

        .display {
            background-color: #060504;
            border: 3px solid #171310;
            border-bottom: 6px solid #110e0c;
            padding: 15px 20px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.95);
            border-radius: 4px;
        }

        .number-indicator {
            color: #ff8400;
            font-size: 38px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 12px rgba(255, 132, 0, 0.7);
            width: 80px;
        }

        .target-state-box {
            width: 50px;
            height: 50px;
            border: 5px solid #ff8400;
            box-shadow: 0 0 12px rgba(255, 132, 0, 0.3);
            background-color: transparent;
            transition: background-color 0.08s, box-shadow 0.08s;
            border-radius: 2px;
        }

        .target-state-box.filled {
            background-color: #ff8400;
            box-shadow: 0 0 20px rgba(255, 132, 0, 0.8), inset 0 0 8px rgba(255,255,255,0.5);
        }

        .round-counter-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .round-number {
            color: #ff8400;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 132, 0, 0.6);
            margin-bottom: 5px;
        }

        .round-boxes {
            display: flex;
            gap: 6px;
        }

        .round-box {
            width: 12px;
            height: 12px;
            border: 2px solid #ff8400;
            background-color: transparent;
            border-radius: 1px;
        }

        .round-box.completed {
            background-color: #ff8400;
            box-shadow: 0 0 8px rgba(255, 132, 0, 0.8);
        }

        .progress-container {
            width: 100%;
            background-color: #080605;
            height: 16px;
            margin-bottom: 30px;
            border: 3px solid #030202;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 3px;
            box-sizing: border-box;
            border-radius: 3px;
        }

        .progress-segment {
            background-color: #120e0c;
            height: 100%;
            transition: background-color 0.05s linear;
        }

        .progress-segment.active {
            background: linear-gradient(to bottom, #ff9e33, #ff8400);
            box-shadow: 0 0 8px rgba(255, 132, 0, 0.7);
        }

        .switches-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            row-gap: 20px;
            column-gap: 30px;
        }

        .switch-slot {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .switch-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 6px;
        }

        .switch-number {
            font-size: 13px;
            color: #8c7662;
            background-color: #0a0807;
            padding: 2px 6px;
            border: 1px solid #1c1613;
            font-weight: bold;
            border-radius: 2px;
        }

        .status-light {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #14100e;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
            transition: background-color 0.1s, box-shadow 0.1s;
        }

        .status-light.active {
            background-color: #ff8400;
            box-shadow: 0 0 12px #ff8400, 0 0 4px #fff;
        }

        .slider-housing {
            position: relative;
            width: 100%;
            height: 46px;
            background: #080605;
            border: 3px solid #17120e;
            border-bottom-color: #241d18;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.9);
            cursor: pointer;
            overflow: hidden;
            box-sizing: border-box;
            border-radius: 4px;
            transition: background-color 0.1s;
        }

        .slider-housing.on {
            background: #140d06;
        }

        .lever {
            position: absolute;
            top: 4px;
            bottom: 4px;
            width: 40px;
            background: linear-gradient(to bottom, #54473c 0%, #2e251f 100%);
            border: 2px solid #40352d;
            border-bottom-color: #1f1915;
            box-shadow: -4px 0 8px rgba(0,0,0,0.6), 4px 0 8px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: left 0.12s cubic-bezier(0.25, 1, 0.5, 1);
            left: 5px;
            border-radius: 3px;
        }

        .slider-housing.on .lever {
            left: calc(100% - 45px);
            background: linear-gradient(to bottom, #736254 0%, #473a31 100%);
            border-color: #594c41;
            box-shadow: -4px 0 12px rgba(0,0,0,0.7), 0 0 8px rgba(255, 132, 0, 0.2);
        }

        .shake {
            animation: shake-anim 0.2s ease-in-out;
        }
        @keyframes shake-anim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .doors-start-btn {
            background: linear-gradient(to bottom, #ebdcb9 0%, #d1be94 100%);
            color: #140f0a;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 16px;
            width: 440px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 6px 0 #94825c, 0 12px 25px rgba(0,0,0,0.7);
            transition: transform 0.05s, box-shadow 0.05s, background 0.2s;
            text-align: center;
            box-sizing: border-box;
            text-shadow: 0 1px 1px rgba(255,255,255,0.4);
        }

        .doors-start-btn:hover:not(:disabled) {
            background: linear-gradient(to bottom, #f5e7c8 0%, #ebdcb9 100%);
        }

        .doors-start-btn:active:not(:disabled) {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #94825c, 0 6px 12px rgba(0,0,0,0.7);
        }

        .doors-start-btn:disabled {
            background: #191614;
            color: #38312a;
            box-shadow: 0 6px 0 #0f0d0b;
            cursor: not-allowed;
            transform: none;
            text-shadow: none;
        }

        /* 1-ZU-1 CRIMSON/BROWN SHOP-OVERLAY AUS DEN SCREENSHOTS */
        .result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(6, 4, 3, 0.65);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .result-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* Hauptkarte: Exaktes Dunkelbraun mit feiner schwarzer Kontur */
        .result-card {
            background-color: #231610;
            border: 4px solid #0c0705;
            padding: 35px 35px 25px 35px;
            border-radius: 12px;
            width: 620px;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
        }

        /* Überschrift: Reinweiß, fette Montserrat, leichter Versatz nach unten */
        .result-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 38px;
            color: #ffffff;
            margin: 0 0 15px 0;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 3px 0px rgba(0, 0, 0, 0.5);
        }

        /* Zitat-Text: Kursiv in Anführungszeichen */
        .result-quote {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 21px;
            color: #ffffff;
            text-align: center;
            margin-bottom: 22px;
            letter-spacing: 0.5px;
        }

        /* Die Infoliste im exakten Look von Screenshot 2 */
        .result-stats-list {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 16px;
            color: #c9b9a5;
            margin: 0 0 30px 0;
            padding: 0 0 0 35px;
            list-style-type: disc;
        }

        .result-stats-list li {
            margin-bottom: 16px;
            line-height: 1.4;
            letter-spacing: 0.2px;
        }
        
        .result-stats-list li::marker {
            color: #8a7a6b;
        }

        /* Beige Box für die Zeit – Exakter Nachbau von Screenshot 1 */
        .price-display-box {
            background-color: #f1e4ca;
            color: #1b120c;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 34px;
            text-align: center;
            padding: 16px 0;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: inset 0 -5px 0px rgba(12, 7, 5, 0.15);
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        /* Weiter-Button: Nutzt dieselbe Struktur wie die Box, reagiert aber haptisch */
        .continue-btn {
            background-color: #f1e4ca;
            color: #1b120c;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 34px;
            padding: 16px 0;
            width: 100%;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 6px 0px #0c0705;
            transition: transform 0.05s, box-shadow 0.05s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-sizing: border-box;
            display: block;
            text-align: center;
        }

        .continue-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #0c0705;
        }
    </style>
</head>
<body>

    <div class="speedrun-timer" id="timer-box">Zeit: <span id="stopwatch">00:00.00</span></div>

    <div class="breaker-box" id="box">
        <div class="display">
            <div class="number-indicator" id="num-indicator">--</div>
            <div class="target-state-box" id="target-box"></div>
            <div class="round-counter-wrapper">
                <div class="round-number" id="round-text">0/3</div>
                <div class="round-boxes">
                    <div class="round-box" id="box-r1"></div>
                    <div class="round-box" id="box-r2"></div>
                    <div class="round-box" id="box-r3"></div>
                </div>
            </div>
        </div>

        <div class="progress-container" id="progress-container"></div>

        <div class="switches-grid" id="grid"></div>
    </div>

    <button class="doors-start-btn" id="start-btn" onclick="pressStartButton()">TRAINING STARTEN</button>

    <div class="result-overlay" id="result-overlay">
        <div class="result-card">
            <h2 class="result-title">FERTIG!</h2>
            
            <div class="result-quote">"Für den Aufzug gut geeignet!"</div>

            <ul class="result-stats-list">
                <li>Alle 3 Runden des Sicherungskastens erfolgreich absolviert.</li>
                <li>Fehlversuche während des Trainings: <span id="final-errors" style="color: #ff5555;">0</span></li>
            </ul>

            <div class="price-display-box" id="final-time">
                00:00.00
            </div>

            <button class="continue-btn" onclick="closeEndScreen()">Weiter</button>
        </div>
    </div>

<script>
    const totalSwitches = 10;
    let currentRound = 1;
    let stepIndex = 0;
    
    let targetPattern = [];     
    let userPattern = [];       
    let queryOrder = [];        

    let startTime = null;
    let totalElapsedTime = 0;
    let timerInterval = null;
    let displayInterval = null;
    let evalTimeout = null;
    let timerRunning = false;
    let isEvaluating = false; 
    let gameActive = false;

    let currentActiveBars = 0; 
    let errorCount = 0; 

    const speeds = { 1: 1000, 2: 800, 3: 600 }; 

    const box = document.getElementById('box');
    const numIndicator = document.getElementById('num-indicator');
    const targetBox = document.getElementById('target-box');
    const progressContainer = document.getElementById('progress-container');
    const roundText = document.getElementById('round-text');
    const stopwatch = document.getElementById('stopwatch');
    const grid = document.getElementById('grid');
    const startBtn = document.getElementById('start-btn');
    
    const resultOverlay = document.getElementById('result-overlay');
    const finalTime = document.getElementById('final-time');
    const finalErrors = document.getElementById('final-errors');

    for (let i = 0; i < totalSwitches; i++) {
        const segment = document.createElement('div');
        segment.className = 'progress-segment';
        segment.id = `segment-${i}`;
        progressContainer.appendChild(segment);
    }

    for (let i = 1; i <= totalSwitches; i++) {
        const idStr = String(i).padStart(2, '0');
        const slot = document.createElement('div');
        slot.className = 'switch-slot';
        slot.innerHTML = `
            <div class="switch-header">
                <div class="switch-number">${idStr}</div>
                <div class="status-light" id="light-${i}"></div>
            </div>
            <div class="slider-housing" id="housing-${i}" onclick="toggleLever(${i})">
                <div class="lever" id="lever-${i}"></div>
            </div>
        `;
        grid.appendChild(slot);
        userPattern[i] = false;
    }

    function pressStartButton() {
        if (gameActive) return;
        gameActive = true;
        startBtn.disabled = true;
        errorCount = 0; 
        startTimer();
        startRound(1);
    }

    function startTimer() {
        if (timerRunning) return;
        startTime = performance.now();
        timerInterval = setInterval(() => {
            totalElapsedTime = performance.now() - startTime;
            const minutes = Math.floor(totalElapsedTime / 60000);
            const seconds = Math.floor((totalElapsedTime % 60000) / 1000);
            const ms = Math.floor((totalElapsedTime % 1000) / 10);
            stopwatch.innerText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;
        }, 10);
        timerRunning = true;
    }

    function resetAllLevers() {
        for(let i = 1; i <= totalSwitches; i++) {
            userPattern[i] = false;
            document.getElementById(`housing-${i}`).classList.remove('on');
            document.getElementById(`light-${i}`).classList.remove('active');
        }
    }

    function startRound(round, keepValues = false) {
        currentRound = round;
        stepIndex = 0;
        isEvaluating = false;
        clearInterval(displayInterval);
        clearTimeout(evalTimeout);

        if (!keepValues) {
            resetAllLevers();
            targetPattern = [];
            for(let i = 1; i <= totalSwitches; i++) {
                targetPattern[i] = Math.random() > 0.5;
            }
            currentActiveBars = 0;
            drawProgressBar(0);
        }

        let baseNumbers = Array.from({length: totalSwitches}, (_, i) => i + 1);

        if (currentRound === 3) {
            let hiddenNumberIndex = Math.floor(Math.random() * baseNumbers.length);
            let hiddenNumber = baseNumbers.splice(hiddenNumberIndex, 1)[0];
            baseNumbers.sort(() => Math.random() - 0.5);
            baseNumbers.push(hiddenNumber);
            queryOrder = baseNumbers;
        } else {
            queryOrder = baseNumbers.sort(() => Math.random() - 0.5);
        }

        updateRoundDisplay();
        
        runDisplayLoop();
        displayInterval = setInterval(runDisplayLoop, speeds[currentRound]);
    }

    function runDisplayLoop() {
        if (stepIndex >= totalSwitches) {
            clearInterval(displayInterval);
            evalTimeout = setTimeout(() => {
                isEvaluating = true; 
                animateEvaluation();
            }, 1500);
            return;
        }

        const currentSwitchNum = queryOrder[stepIndex];
        const requiredState = targetPattern[currentSwitchNum];

        if (currentRound === 3 && stepIndex === totalSwitches - 1) {
            numIndicator.innerText = "??";
        } else {
            numIndicator.innerText = String(currentSwitchNum).padStart(2, '0');
        }

        if (requiredState) {
            targetBox.classList.add('filled');
        } else {
            targetBox.classList.remove('filled');
        }

        stepIndex++;
    }

    function drawProgressBar(count) {
        for (let i = 0; i < totalSwitches; i++) {
            const seg = document.getElementById('segment-' + i);
            if (i < count) {
                seg.classList.add('active');
            } else {
                seg.classList.remove('active');
            }
        }
    }

    function animateEvaluation() {
        let correctCount = 0;
        for (let i = 1; i <= totalSwitches; i++) {
            if (userPattern[i] === targetPattern[i]) {
                correctCount++;
            }
        }

        let stepsDelta = Math.abs(correctCount - currentActiveBars);
        let stepDuration = stepsDelta > 0 ? (2500 / stepsDelta) : 2500;

        function stepAnimation() {
            if (currentActiveBars === correctCount) {
                if (correctCount === totalSwitches) {
                    setTimeout(() => processRoundEndTransition(true), 1000);
                } else {
                    setTimeout(() => processRoundEndTransition(false), 1000);
                }
                return;
            }

            if (currentActiveBars < correctCount) {
                currentActiveBars++;
            } else {
                currentActiveBars--;
            }

            drawProgressBar(currentActiveBars);
            setTimeout(stepAnimation, stepDuration);
        }

        if (stepsDelta === 0) {
            setTimeout(() => {
                if (correctCount === totalSwitches) {
                    setTimeout(() => processRoundEndTransition(true), 1000);
                } else {
                    setTimeout(() => processRoundEndTransition(false), 1000);
                }
            }, 2500);
        } else {
            stepAnimation();
        }
    }

    function processRoundEndTransition(isPerfect) {
        if (isPerfect) {
            if (currentRound < 3) {
                startRound(currentRound + 1);
            } else {
                clearInterval(timerInterval);
                showEndScreen();
            }
        } else {
            errorCount++; 
            box.classList.add('shake');
            setTimeout(() => box.classList.remove('shake'), 200);
            startRound(currentRound, true); 
        }
    }

    function showEndScreen() {
        finalTime.innerText = stopwatch.innerText;
        finalErrors.innerText = errorCount;
        resultOverlay.classList.add('show');
    }

    function closeEndScreen() {
        resultOverlay.classList.remove('show');
        resetGameComplete(); 
    }

    function toggleLever(id) {
        if (!gameActive || isEvaluating) return; 

        const housing = document.getElementById(`housing-${id}`);
        const light = document.getElementById(`light-${id}`);
        
        userPattern[id] = !userPattern[id];

        if (userPattern[id]) {
            housing.classList.add('on');
            light.classList.add('active');
        } else {
            housing.classList.remove('on');
            light.classList.remove('active');
        }
    }

    function resetGameComplete() {
        clearInterval(timerInterval);
        currentRound = 1;
        timerRunning = false;
        gameActive = false;
        startBtn.disabled = false; 
        stopwatch.innerText = "00:00.00";
        numIndicator.innerText = "--";
        targetBox.classList.remove('filled');
        resetAllLevers();
        currentActiveBars = 0;
        drawProgressBar(0);
        updateRoundDisplay();
    }

    function updateRoundDisplay() {
        roundText.innerText = `${currentRound - 1}/3`;
        document.getElementById('box-r1').className = 'round-box' + (currentRound > 1 ? ' completed' : '');
        document.getElementById('box-r2').className = 'round-box' + (currentRound > 2 ? ' completed' : '');
        document.getElementById('box-r3').className = 'round-box';
    }

    updateRoundDisplay();
</script>

</body>
</html>
