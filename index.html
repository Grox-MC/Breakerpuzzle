<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOORS Door 100 Elevator Trainer</title>
    <style>
        body {
            background-color: #0b0b0d;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .speedrun-timer {
            font-size: 24px;
            color: #888;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .speedrun-timer span {
            color: #ff9d00;
        }

        .breaker-box {
            background: linear-gradient(135deg, #282828 0%, #1e1e1e 100%);
            border: 14px solid #141414;
            outline: 4px solid #0a0a0a;
            padding: 30px 25px;
            width: 360px;
            border-radius: 4px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }

        .display {
            background-color: #0d0d0f;
            border: 3px solid #1c1c22;
            border-bottom: 5px solid #141417;
            padding: 12px 15px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 55px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
        }

        .number-indicator {
            color: #ff9d00;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255, 157, 0, 0.6);
            width: 60px;
        }

        .target-state-box {
            width: 44px;
            height: 44px;
            border: 5px solid #ff9d00;
            box-shadow: 0 0 10px rgba(255, 157, 0, 0.4);
            background-color: transparent;
            transition: background-color 0.1s;
        }

        .target-state-box.filled {
            background-color: #ff9d00;
            box-shadow: 0 0 15px rgba(255, 157, 0, 0.8);
        }

        .round-counter-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .round-number {
            color: #ff9d00;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 157, 0, 0.6);
            margin-bottom: 2px;
        }

        .round-boxes {
            display: flex;
            gap: 4px;
        }

        .round-box {
            width: 10px;
            height: 10px;
            border: 2px solid #ff9d00;
            background-color: transparent;
        }

        .round-box.completed {
            background-color: #ff9d00;
            box-shadow: 0 0 5px rgba(255, 157, 0, 0.8);
        }

        .progress-container {
            width: 100%;
            background-color: #141419;
            height: 12px;
            margin-bottom: 25px;
            border: 2px solid #0d0d0f;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            box-sizing: border-box;
        }

        .progress-segment {
            background-color: #1a1a22;
            height: 100%;
            transition: background-color 0.05s linear;
        }

        .progress-segment.active {
            background: linear-gradient(to bottom, #ffb74d, #ff9d00);
            box-shadow: 0 0 6px rgba(255, 157, 0, 0.6);
        }

        .switches-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            row-gap: 16px;
            column-gap: 24px;
        }

        .switch-slot {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .switch-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 4px;
        }

        .switch-number {
            font-size: 11px;
            color: #555;
            background-color: #151515;
            padding: 1px 4px;
            border: 1px solid #252525;
            font-weight: bold;
        }

        .status-light {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #222;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
            transition: background-color 0.1s, box-shadow 0.1s;
        }

        .status-light.active {
            background-color: #ff9d00;
            box-shadow: 0 0 8px #ff9d00, 0 0 2px #fff;
        }

        .slider-housing {
            position: relative;
            width: 100%;
            height: 38px;
            background: #121214;
            border: 3px solid #222;
            border-bottom-color: #333;
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.8);
            cursor: pointer;
            overflow: hidden;
            box-sizing: border-box;
        }

        .lever {
            position: absolute;
            top: 3px;
            bottom: 3px;
            width: 32px;
            background: linear-gradient(to bottom, #777 0%, #444 100%);
            border: 2px solid #555;
            box-shadow: -3px 0 5px rgba(0,0,0,0.5), 3px 0 5px rgba(0,0,0,0.5);
            transition: left 0.1s ease-in-out;
            left: 4px;
        }

        .slider-housing.on .lever {
            left: calc(100% - 36px);
            background: linear-gradient(to bottom, #999 0%, #555 100%);
        }

        .shake {
            animation: shake-anim 0.2s ease-in-out;
        }
        @keyframes shake-anim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .doors-start-btn {
            background-color: #ebdcb9;
            color: #1a1510;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 22px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 14px;
            width: 360px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 5px 0 #b09e7a, 0 8px 20px rgba(0,0,0,0.6);
            transition: transform 0.05s, box-shadow 0.05s, background-color 0.2s, color 0.2s;
            text-align: center;
            box-sizing: border-box;
        }

        .doors-start-btn:hover:not(:disabled) {
            background-color: #f5e7c8;
        }

        .doors-start-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #b09e7a, 0 4px 10px rgba(0,0,0,0.6);
        }

        .doors-start-btn:disabled {
            background-color: #222226;
            color: #44444a;
            box-shadow: 0 5px 0 #141416;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="speedrun-timer">ZEIT: <span id="stopwatch">00:00.00</span></div>

    <div class="breaker-box" id="box">
        <div class="display">
            <div class="number-indicator" id="num-indicator">--</div>
            <div class="target-state-box" id="target-box"></div>
            <div class="round-counter-wrapper">
                <div class="round-number" id="round-text">0/3</div>
                <div class="round-boxes">
                    <div class="round-box" id="box-r1"></div>
                    <div class="round-box" id="box-r2"></div>
                    <div class="round-box" id="box-r3"></div>
                </div>
            </div>
        </div>

        <div class="progress-container" id="progress-container"></div>

        <div class="switches-grid" id="grid"></div>
    </div>

    <button class="doors-start-btn" id="start-btn" onclick="pressStartButton()">TRAINING STARTEN</button>

<script>
    const totalSwitches = 10;
    let currentRound = 1;
    let stepIndex = 0;
    
    let targetPattern = [];     
    let userPattern = [];       
    let queryOrder = [];        

    let startTime = null;
    let timerInterval = null;
    let displayInterval = null;
    let evalTimeout = null;
    let timerRunning = false;
    let isEvaluating = false; 
    let gameActive = false;

    let currentActiveBars = 0; 

    // Intervalle: R1 = 1s, R2 = 0.8s, R3 = 0.6s
    const speeds = { 1: 1000, 2: 800, 3: 600 }; 

    const box = document.getElementById('box');
    const numIndicator = document.getElementById('num-indicator');
    const targetBox = document.getElementById('target-box');
    const progressContainer = document.getElementById('progress-container');
    const roundText = document.getElementById('round-text');
    const stopwatch = document.getElementById('stopwatch');
    const grid = document.getElementById('grid');
    const startBtn = document.getElementById('start-btn');

    for (let i = 0; i < totalSwitches; i++) {
        const segment = document.createElement('div');
        segment.className = 'progress-segment';
        segment.id = `segment-${i}`;
        progressContainer.appendChild(segment);
    }

    for (let i = 1; i <= totalSwitches; i++) {
        const idStr = String(i).padStart(2, '0');
        const slot = document.createElement('div');
        slot.className = 'switch-slot';
        slot.innerHTML = `
            <div class="switch-header">
                <div class="switch-number">${idStr}</div>
                <div class="status-light" id="light-${i}"></div>
            </div>
            <div class="slider-housing" id="housing-${i}" onclick="toggleLever(${i})">
                <div class="lever" id="lever-${i}"></div>
            </div>
        `;
        grid.appendChild(slot);
        userPattern[i] = false;
    }

    function pressStartButton() {
        if (gameActive) return;
        gameActive = true;
        startBtn.disabled = true;
        startTimer();
        startRound(1);
    }

    function startTimer() {
        if (timerRunning) return;
        startTime = performance.now();
        timerInterval = setInterval(() => {
            const elapsedTime = performance.now() - startTime;
            const minutes = Math.floor(elapsedTime / 60000);
            const seconds = Math.floor((elapsedTime % 60000) / 1000);
            const ms = Math.floor((elapsedTime % 1000) / 10);
            stopwatch.innerText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;
        }, 10);
        timerRunning = true;
    }

    function resetAllLevers() {
        for(let i = 1; i <= totalSwitches; i++) {
            userPattern[i] = false;
            document.getElementById(`housing-${i}`).classList.remove('on');
            document.getElementById(`light-${i}`).classList.remove('active');
        }
    }

    function startRound(round, keepValues = false) {
        currentRound = round;
        stepIndex = 0;
        isEvaluating = false;
        clearInterval(displayInterval);
        clearTimeout(evalTimeout);

        if (!keepValues) {
            resetAllLevers();
            targetPattern = [];
            for(let i = 1; i <= totalSwitches; i++) {
                targetPattern[i] = Math.random() > 0.5;
            }
            currentActiveBars = 0;
            drawProgressBar(0);
        }

        let baseNumbers = Array.from({length: totalSwitches}, (_, i) => i + 1);

        if (currentRound === 3) {
            let hiddenNumberIndex = Math.floor(Math.random() * baseNumbers.length);
            let hiddenNumber = baseNumbers.splice(hiddenNumberIndex, 1)[0];
            baseNumbers.sort(() => Math.random() - 0.5);
            baseNumbers.push(hiddenNumber);
            queryOrder = baseNumbers;
        } else {
            queryOrder = baseNumbers.sort(() => Math.random() - 0.5);
        }

        updateRoundDisplay();
        
        runDisplayLoop();
        displayInterval = setInterval(runDisplayLoop, speeds[currentRound]);
    }

    function runDisplayLoop() {
        if (stepIndex >= totalSwitches) {
            clearInterval(displayInterval);
            evalTimeout = setTimeout(() => {
                isEvaluating = true; 
                animateEvaluation();
            }, 1500);
            return;
        }

        const currentSwitchNum = queryOrder[stepIndex];
        const requiredState = targetPattern[currentSwitchNum];

        if (currentRound === 3 && stepIndex === totalSwitches - 1) {
            numIndicator.innerText = "??";
        } else {
            numIndicator.innerText = String(currentSwitchNum).padStart(2, '0');
        }

        if (requiredState) {
            targetBox.classList.add('filled');
        } else {
            targetBox.classList.remove('filled');
        }

        stepIndex++;
    }

    function drawProgressBar(count) {
        for (let i = 0; i < totalSwitches; i++) {
            const seg = document.getElementById('segment-' + i);
            if (i < count) {
                seg.classList.add('active');
            } else {
                seg.classList.remove('active');
            }
        }
    }

    function animateEvaluation() {
        let correctCount = 0;
        for (let i = 1; i <= totalSwitches; i++) {
            if (userPattern[i] === targetPattern[i]) {
                correctCount++;
            }
        }

        let stepsDelta = Math.abs(correctCount - currentActiveBars);
        let stepDuration = stepsDelta > 0 ? (2500 / stepsDelta) : 2500;

        function stepAnimation() {
            if (currentActiveBars === correctCount) {
                if (correctCount === totalSwitches) {
                    setTimeout(() => processRoundEndTransition(true), 1000);
                } else {
                    setTimeout(() => {
                        if (currentActiveBars > 0) {
                            currentActiveBars--;
                            drawProgressBar(currentActiveBars);
                        }
                        setTimeout(() => processRoundEndTransition(false), 1000);
                    }, 500);
                }
                return;
            }

            if (currentActiveBars < correctCount) {
                currentActiveBars++;
            } else {
                currentActiveBars--;
            }

            drawProgressBar(currentActiveBars);
            setTimeout(stepAnimation, stepDuration);
        }

        if (stepsDelta === 0) {
            setTimeout(() => {
                if (correctCount === totalSwitches) {
                    setTimeout(() => processRoundEndTransition(true), 1000);
                } else {
                    if (currentActiveBars > 0) {
                        currentActiveBars--;
                        drawProgressBar(currentActiveBars);
                    }
                    setTimeout(() => processRoundEndTransition(false), 1000);
                }
            }, 2500);
        } else {
            stepAnimation();
        }
    }

    function processRoundEndTransition(isPerfect) {
        if (isPerfect) {
            if (currentRound < 3) {
                startRound(currentRound + 1);
            } else {
                clearInterval(timerInterval);
                alert(`Aufzug bereit! Endzeit: ${stopwatch.innerText}`);
                resetGameComplete();
            }
        } else {
            box.classList.add('shake');
            setTimeout(() => box.classList.remove('shake'), 200);
            startRound(currentRound, true); 
        }
    }

    function toggleLever(id) {
        if (!gameActive || isEvaluating) return; 

        const housing = document.getElementById(`housing-${id}`);
        const light = document.getElementById(`light-${id}`);
        
        userPattern[id] = !userPattern[id];

        if (userPattern[id]) {
            housing.classList.add('on');
            light.classList.add('active');
        } else {
            housing.classList.remove('on');
            light.classList.remove('active');
        }
    }

    function resetGameComplete() {
        clearInterval(timerInterval);
        currentRound = 1;
        timerRunning = false;
        gameActive = false;
        startBtn.disabled = false;
        stopwatch.innerText = "00:00.00";
        numIndicator.innerText = "--";
        targetBox.classList.remove('filled');
        resetAllLevers();
        currentActiveBars = 0;
        drawProgressBar(0);
        updateRoundDisplay();
    }

    function updateRoundDisplay() {
        roundText.innerText = `${currentRound - 1}/3`;
        document.getElementById('box-r1').className = 'round-box' + (currentRound > 1 ? ' completed' : '');
        document.getElementById('box-r2').className = 'round-box' + (currentRound > 2 ? ' completed' : '');
        document.getElementById('box-r3').className = 'round-box';
    }

    updateRoundDisplay();
</script>

</body>
</html>
